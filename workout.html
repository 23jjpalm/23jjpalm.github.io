<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Minute Timer</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }

    .container {
      background: #1e1e1e;
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 0 25px rgba(0,0,0,0.5);
    }

    h1 {
      margin-top: 0;
    }

    input {
      width: 80px;
      padding: 10px;
      margin: 8px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      text-align: center;
    }

    button {
      padding: 12px 18px;
      margin: 8px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #2f80ed;
      color: white;
    }

    button:hover {
      background: #1f6fd1;
    }

    .reset {
      background: #c0392b;
    }

    .reset:hover {
      background: #a93226;
    }

    #display {
      font-size: 64px;
      font-weight: bold;
      margin: 25px 0;
    }

    #status {
      color: #aaa;
      font-size: 15px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Workout Timer</h1>

    <div>
      <label>Minutes:</label>
      <input type="number" id="minutesInput" min="0" value="10">

      <label>Seconds:</label>
      <input type="number" id="secondsInput" min="0" max="59" value="0">
    </div>

    <div id="display">10:00</div>

    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button class="reset" onclick="resetTimer()">Reset</button>

    <p id="status">Dings at the top of every minute.</p>
  </div>

  <script>
    let totalSeconds = 600;
    let remainingSeconds = 600;
    let timer = null;
    let lastMinuteMark = null;

    const display = document.getElementById("display");
    const minutesInput = document.getElementById("minutesInput");
    const secondsInput = document.getElementById("secondsInput");
    const statusText = document.getElementById("status");

    function updateDisplay() {
      const mins = Math.floor(remainingSeconds / 60);
      const secs = remainingSeconds % 60;
      display.textContent = `${mins}:${secs.toString().padStart(2, "0")}`;
    }

    function ding() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      oscillator.type = "sine";
      oscillator.frequency.setValueAtTime(900, audioCtx.currentTime);

      gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);

      oscillator.connect(gain);
      gain.connect(audioCtx.destination);

      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.4);
    }

    function setTimerFromInputs() {
      const mins = parseInt(minutesInput.value) || 0;
      const secs = parseInt(secondsInput.value) || 0;

      totalSeconds = (mins * 60) + secs;
      remainingSeconds = totalSeconds;
      lastMinuteMark = Math.floor(remainingSeconds / 60);

      updateDisplay();
    }

    function startTimer() {
      if (timer !== null) return;

      if (remainingSeconds <= 0) {
        setTimerFromInputs();
      }

      ding();
      statusText.textContent = "Timer running...";

      timer = setInterval(() => {
        remainingSeconds--;

        if (remainingSeconds <= 0) {
          remainingSeconds = 0;
          updateDisplay();
          ding();
          clearInterval(timer);
          timer = null;
          statusText.textContent = "Workout complete!";
          return;
        }

        const currentMinute = Math.floor(remainingSeconds / 60);

        if (remainingSeconds % 60 === 0 && currentMinute !== lastMinuteMark) {
          ding();
          lastMinuteMark = currentMinute;
        }

        updateDisplay();
      }, 1000);
    }

    function pauseTimer() {
      clearInterval(timer);
      timer = null;
      statusText.textContent = "Timer paused.";
    }

    function resetTimer() {
      clearInterval(timer);
      timer = null;
      setTimerFromInputs();
      statusText.textContent = "Timer reset.";
    }

    minutesInput.addEventListener("input", setTimerFromInputs);
    secondsInput.addEventListener("input", setTimerFromInputs);

    setTimerFromInputs();
  </script>
</body>
</html>
