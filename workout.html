<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Timer</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  background: #1e1e1e;
  padding: 25px;
  border-radius: 20px;
  width: 95%;
  max-width: 550px;
  text-align: center;
}

input {
  padding: 10px;
  margin: 5px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  text-align: center;
  width: 90px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  background: #2f80ed;
  color: white;
  cursor: pointer;
}

button:hover { background: #1f6fd1; }

.reset { background: #c0392b; }

.section {
  background: #292929;
  margin-top: 15px;
  padding: 15px;
  border-radius: 12px;
}

#display {
  font-size: 60px;
  margin: 20px 0;
}

.big {
  font-size: 32px;
  color: #4ade80;
}

.log {
  max-height: 220px;
  overflow-y: auto;
  text-align: left;
  font-size: 14px;
}

.log-item {
  border-bottom: 1px solid #444;
  padding: 6px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>Workout Timer</h1>

<input id="minutesInput" type="number" value="10"> min
<input id="secondsInput" type="number" value="0"> sec

<div id="display">10:00</div>

<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button class="reset" onclick="resetTimer()">Reset</button>

<div class="section">
  <p>Total Pullups</p>
  <div class="big" id="totalDisplay">0</div>
  <p>Session: <span id="sessionDisplay">0</span></p>
  <button onclick="resetTotal()">Reset Total</button>
</div>

<div class="section">
  <h3>Manual Add</h3>
  <input id="manualInput" type="number" placeholder="Pullups">
  <input id="weightInput" type="number" placeholder="Weight lbs (optional)">
  <br>
  <button onclick="addManual()">Add</button>
</div>

<div class="section">
  <h3>Log</h3>
  <button onclick="clearLog()">Clear</button>
  <button onclick="downloadLog()">Download</button>
  <div class="log" id="log"></div>
</div>

</div>

<script>
let totalSeconds = 600;
let remainingSeconds = 600;
let timer = null;
let lastMinute = null;

let total = Number(localStorage.getItem("pullups")) || 0;
let session = 0;
let log = JSON.parse(localStorage.getItem("log")) || [];

const display = document.getElementById("display");
const totalDisplay = document.getElementById("totalDisplay");
const sessionDisplay = document.getElementById("sessionDisplay");
const logDiv = document.getElementById("log");

function save() {
  localStorage.setItem("pullups", total);
  localStorage.setItem("log", JSON.stringify(log));
}

function now() {
  const d = new Date();
  return {
    date: d.toLocaleDateString(),
    time: d.toLocaleTimeString()
  };
}

function addLog(amount, source) {
  const w = document.getElementById("weightInput").value;
  const weight = w ? w + " lbs" : "Bodyweight";

  const t = now();

  log.unshift({
    date: t.date,
    time: t.time,
    amount,
    source,
    weight,
    total
  });

  save();
  renderLog();
}

function renderLog() {
  logDiv.innerHTML = "";

  if (log.length === 0) {
    logDiv.innerHTML = "<p>No entries</p>";
    return;
  }

  log.forEach(e => {
    const div = document.createElement("div");
    div.className = "log-item";
    div.innerHTML = `
      <strong>${e.date}</strong> ${e.time}<br>
      +${e.amount} pullups | ${e.weight}<br>
      ${e.source}<br>
      Total: ${e.total}
    `;
    logDiv.appendChild(div);
  });
}

function updateDisplays() {
  totalDisplay.textContent = total;
  sessionDisplay.textContent = session;
  save();
}

function addMinute() {
  total += 5;
  session += 5;
  updateDisplays();
  addLog(5, "Timer");
}

function addManual() {
  const val = parseInt(document.getElementById("manualInput").value);
  if (!val || val <= 0) return;

  total += val;
  session += val;

  updateDisplays();
  addLog(val, "Manual");

  document.getElementById("manualInput").value = "";
}

function setTime() {
  const m = parseInt(minutesInput.value) || 0;
  const s = parseInt(secondsInput.value) || 0;

  totalSeconds = m*60 + s;
  remainingSeconds = totalSeconds;
  lastMinute = Math.floor(remainingSeconds/60);

  updateDisplay();
}

function updateDisplay() {
  const m = Math.floor(remainingSeconds/60);
  const s = remainingSeconds % 60;
  display.textContent = `${m}:${s.toString().padStart(2,"0")}`;
}

function ding() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.frequency.value = 900;
  gain.gain.value = 0.4;

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime + 0.3);
}

function startTimer() {
  if (timer) return;

  if (remainingSeconds <= 0) setTime();

  ding();

  timer = setInterval(() => {
    remainingSeconds--;

    if (remainingSeconds <= 0) {
      remainingSeconds = 0;
      updateDisplay();
      ding();
      clearInterval(timer);
      timer = null;
      return;
    }

    if (remainingSeconds % 60 === 0) {
      ding();
      addMinute();
    }

    updateDisplay();
  },1000);
}

function pauseTimer() {
  clearInterval(timer);
  timer = null;
}

function resetTimer() {
  clearInterval(timer);
  timer = null;
  session = 0;
  setTime();
  updateDisplays();
}

function resetTotal() {
  total = 0;
  session = 0;
  updateDisplays();
  addLog(0, "Reset");
}

function clearLog() {
  log = [];
  save();
  renderLog();
}

function downloadLog() {
  let text = "Pullup Log\n\n";

  log.forEach(e => {
    text += `${e.date} ${e.time} | +${e.amount} | ${e.weight} | ${e.source} | Total ${e.total}\n`;
  });

  const blob = new Blob([text], {type:"text/plain"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "pullups.txt";
  a.click();
}

minutesInput.addEventListener("input", setTime);
secondsInput.addEventListener("input", setTime);

setTime();
updateDisplays();
renderLog();
</script>

</body>
</html>
