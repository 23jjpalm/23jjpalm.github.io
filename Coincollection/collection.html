<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Collection - Coin Tracker</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="wrap">

  <div class="hero">
    <div class="tabs">
      <a class="tab-btn" href="index.html">Home</a>
      <a class="tab-btn active" href="collection.html">Collection</a>
      <a class="tab-btn" href="coin-info.html">Coin Info</a>
      <a class="tab-btn" href="special.html">Special</a>
      <a class="tab-btn" href="manage.html">Add / Manage</a>
    </div>

    <h1>Collection</h1>
    <p class="sub">View all coins and fine silver entries in your shared collection.</p>
  </div>

  <div class="section">
    <div class="controls three">
      <input id="search" placeholder="Search by year, denomination, or notes"/>
      <select id="filter">
        <option value="All">All Denominations</option>
      </select>
      <select id="sort">
        <option value="year-asc">Year ↑</option>
        <option value="year-desc">Year ↓</option>
        <option value="denomination">Denomination</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Year</th>
            <th>Denomination</th>
            <th>Qty</th>
            <th>Silver %</th>
            <th>Weight</th>
            <th>Unit</th>
            <th>Melt Each</th>
            <th>Total Row Value</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

</div>

<script src="data-store.js"></script>
<script>
const FALLBACK_SILVER_SPOT_PER_TROY_OUNCE = 76.61;
let currentSilverSpotPerTroyOunce = FALLBACK_SILVER_SPOT_PER_TROY_OUNCE;
const TROY_OUNCE_IN_GRAMS = 31.1035;

function escapeHtml(text){
  return String(text ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

function denomClass(denomination){
  if (denomination === "Dime") return "denom-dime";
  if (denomination === "Mercury Dime") return "denom-mercury-dime";
  if (denomination === "Roosevelt Dime") return "denom-roosevelt-dime";
  if (denomination === "Quarter") return "denom-quarter";
  if (denomination === "Quarter (Barber)") return "denom-quarter-barber";
  if (denomination === "Half Dollar") return "denom-half-dollar";
  if (denomination === "Dollar Coin") return "denom-dollar-coin";
  if (denomination === "Buffalo Nickel") return "denom-buffalo-nickel";
  if (denomination === "Fine Silver") return "denom-fine-silver";
  return "";
}

function computeMeltEach(weightGrams, silverPercent){
  return weightGrams * (silverPercent / 100) * (currentSilverSpotPerTroyOunce / TROY_OUNCE_IN_GRAMS);
}

function formatWeight(coin){
  const weightUnit = coin.weightUnit || "g";
  if (weightUnit === "oz"){
    return (Number(coin.weightGrams || 0) / TROY_OUNCE_IN_GRAMS).toFixed(4);
  }
  return Number(coin.weightGrams || 0).toFixed(2);
}

function populateFilter(coins){
  const filter = document.getElementById("filter");
  const current = filter.value || "All";
  const values = [...new Set(coins.map(c => c.denomination))].sort();

  filter.innerHTML = '<option value="All">All Denominations</option>';
  values.forEach(value => {
    const option = document.createElement("option");
    option.value = value;
    option.textContent = value;
    filter.appendChild(option);
  });

  if ([...filter.options].some(option => option.value === current)){
    filter.value = current;
  }
}

function render(){
  const coins = CoinDataStore.getCoins();

  populateFilter(coins);

  const query = document.getElementById("search").value.trim().toLowerCase();
  const filter = document.getElementById("filter").value;
  const sort = document.getElementById("sort").value;

  let rows = coins.filter(coin => {
    const matchesQuery =
      String(coin.year).includes(query) ||
      coin.denomination.toLowerCase().includes(query) ||
      String(coin.silverContent).includes(query) ||
      String(coin.weightGrams).includes(query) ||
      (coin.notes || "").toLowerCase().includes(query);

    const matchesFilter =
      filter === "All" || coin.denomination === filter;

    return matchesQuery && matchesFilter;
  });

  rows.sort((a, b) => {
    if (sort === "year-desc") return b.year - a.year;
    if (sort === "denomination") return a.denomination.localeCompare(b.denomination) || a.year - b.year;
    return a.year - b.year;
  });

  const body = document.getElementById("tableBody");
  body.innerHTML = "";

  if (!rows.length){
    body.innerHTML = '<tr><td colspan="9">No entries match your current search.</td></tr>';
    return;
  }

  rows.forEach(coin => {
    const meltEach = computeMeltEach(Number(coin.weightGrams || 0), Number(coin.silverContent || 0));
    const quantity = Number(coin.quantity || 0);

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${coin.year}</td>
      <td><span class="badge ${denomClass(coin.denomination)}">${escapeHtml(coin.denomination)}</span></td>
      <td>${quantity}</td>
      <td>${Number(coin.silverContent || 0)}%</td>
      <td>${formatWeight(coin)}</td>
      <td>${escapeHtml(coin.weightUnit || "g")}</td>
      <td>$${meltEach.toFixed(2)}</td>
      <td>$${(meltEach * quantity).toFixed(2)}</td>
      <td>${escapeHtml(coin.notes || "")}</td>
    `;
    body.appendChild(tr);
  });
}

async function fetchLiveSilverSpotPrice(){
  try{
    const response = await fetch("https://api.gold-api.com/price/XAG", { cache: "no-store" });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    const price = Number(data.price);
    if (Number.isFinite(price) && price > 0){
      currentSilverSpotPerTroyOunce = price;
    }
  }catch(error){
    console.warn("Using fallback silver price.", error);
  }

  render();
}

document.getElementById("search").addEventListener("input", render);
document.getElementById("filter").addEventListener("change", render);
document.getElementById("sort").addEventListener("change", render);

CoinDataStore.initializeIfNeeded();
render();
fetchLiveSilverSpotPrice();
</script>
</body>
</html>
